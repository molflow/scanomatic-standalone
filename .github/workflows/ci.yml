name: Scan-o-Matic CI

on: [push]

permissions:
  contents: read

jobs:
    frontend-lint:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version-file: .nvmrc

        - name: Install
          run: |
            npm ci

        - name: Lint
          run: |
            npm run lint

    frontend-test:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version-file: .nvmrc
        - uses: browser-actions/setup-chrome@latest
        - uses: nanasess/setup-chromedriver@master

        - name: Setup Chromedriver
          run: |
            export DISPLAY=:99
            chromedriver --url-base=/wd/hub &
            sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 & # optional

        - name: Install
          run: |
            npm ci

        - name: Test
          run: |
            npm test

    frontend-build:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version-file: .nvmrc

        - name: Install
          run: |
            npm ci

        - name: Builds
          run: |
            npm run build

    backend-lint:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.9'

        - name: Install General Dependencies
          run: |
            python3.9 -m pip install --upgrade pip
            pip install tox==3.27.1

        - name: Lint and Types
          run: |
            tox -e lint

    backend-mypy:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.9'

        - name: Install General Dependencies
          run: |
            python3.9 -m pip install --upgrade pip
            pip install tox==3.27.1

        - name: Mypy (allow up to threshold)
          run: |
            THRESHOLD=416
            tox -e mypy 2>&1 | tee mypy-output.txt || true
            MYPY_ERRORS=$(grep -c ': error:' mypy-output.txt || true)

            echo "mypy reported $MYPY_ERRORS errors (threshold: $THRESHOLD)"

            if (( MYPY_ERRORS > THRESHOLD )); then
              echo "Failing because mypy errors exceed threshold."
              exit 1
            fi

            echo "Passing: mypy errors are within threshold."

    backend-test-unit:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.9'

        - name: Install General Dependencies
          run: |
            python3.9 -m pip install --upgrade pip
            pip install tox==3.27.1

        - name: Run unit tests
          run: |
            tox -e unit

    backend-test-integration:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.9'

        - name: Install General Dependencies
          run: |
            python3.9 -m pip install --upgrade pip
            pip install tox==3.27.1

        - name: Run integration tests
          run: |
            tox -e integration

    test-system:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
        - uses: browser-actions/setup-chrome@latest
        - uses: browser-actions/setup-firefox@latest
        - uses: browser-actions/setup-geckodriver@latest
        - uses: nanasess/setup-chromedriver@master

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.9'

        - name: Install General Dependencies
          run: |
            python3.9 -m pip install --upgrade pip
            pip install tox==3.27.1

        - name: Run headless system test
          uses: GabrielBB/xvfb-action@v1
          with:
            run: tox -e system

    docker-build:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6

        - name: Build
          run: |
            docker compose build
