name: Scan-o-Matic Mypy PR Gate

on: [pull_request]

permissions:
  contents: read

jobs:
    backend-mypy:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 0
        - uses: astral-sh/setup-uv@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version-file: '.python-version'

        - name: Mypy global non-regression
          run: |
            set -euo pipefail

            count_mypy_issues() {
              local label="$1"
              local output_file="$2"
              local issues

              echo "Running mypy on $label..."
              uvx --with tox-uv tox -e mypy 2>&1 | tee "$output_file" || true

              # Prefer mypy's own final total when present.
              issues=$(grep -Eo 'Found [0-9]+ errors?' "$output_file" | tail -n1 | grep -Eo '[0-9]+' || true)
              if [[ -z "$issues" ]]; then
                issues=$(grep -E -c ': (error|warning):' "$output_file" || true)
              fi

              echo "mypy issues on $label: $issues"
              MYPY_ISSUES="$issues"
            }

            HEAD_SHA=$(git rev-parse HEAD)
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags origin "$BASE_SHA" --depth=1

            count_mypy_issues "head" mypy-head.txt
            HEAD_ISSUES="$MYPY_ISSUES"

            git checkout --quiet "$BASE_SHA"
            count_mypy_issues "base" mypy-base.txt
            BASE_ISSUES="$MYPY_ISSUES"

            git checkout --quiet "$HEAD_SHA"

            if (( HEAD_ISSUES > BASE_ISSUES )); then
              echo "Failing because this PR increases global mypy issues (head=$HEAD_ISSUES, base=$BASE_ISSUES)."
              exit 1
            fi

            echo "Passing: this PR does not increase global mypy issues (head=$HEAD_ISSUES, base=$BASE_ISSUES)."
