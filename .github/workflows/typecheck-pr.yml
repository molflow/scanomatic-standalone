name: Scan-o-Matic Ty PR Gate

on: [pull_request]

permissions:
  contents: read

jobs:
  backend-ty:
        runs-on: ubuntu-24.04
        steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 0
        - uses: astral-sh/setup-uv@v6

        - name: Setup Python
          uses: actions/setup-python@v6
          with:
            python-version-file: '.python-version'

        - name: Ty global non-regression
          run: |
            set -euo pipefail

            count_ty_issues() {
              local label="$1"
              local output_file="$2"
              local issues

              echo "Running ty on $label..."
              uvx ty check scanomatic tests 2>&1 | tee "$output_file" || true

              # Prefer the checker's own final total when present.
              issues=$(grep -Eo 'Found [0-9]+ (errors?|warnings?|diagnostics?)' "$output_file" | tail -n1 | grep -Eo '[0-9]+' || true)
              if [[ -z "$issues" ]]; then
                issues=$(grep -E -c '(^error(\[|:)|: (error|warning):|^[[:space:]]*error:)' "$output_file" || true)
              fi

              echo "ty issues on $label: $issues"
              TY_ISSUES="$issues"
            }

            HEAD_SHA=$(git rev-parse HEAD)
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags origin "$BASE_SHA" --depth=1

            count_ty_issues "head" ty-head.txt
            HEAD_ISSUES="$TY_ISSUES"

            git checkout --quiet "$BASE_SHA"
            count_ty_issues "base" ty-base.txt
            BASE_ISSUES="$TY_ISSUES"

            git checkout --quiet "$HEAD_SHA"

            if (( HEAD_ISSUES > BASE_ISSUES )); then
              echo "Failing because this PR increases global ty issues (head=$HEAD_ISSUES, base=$BASE_ISSUES)."
              exit 1
            fi

            echo "Passing: this PR does not increase global ty issues (head=$HEAD_ISSUES, base=$BASE_ISSUES)."
